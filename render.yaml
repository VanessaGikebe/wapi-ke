# Render Blueprint — FastAPI API + Postgres + daily events cron.
# Deploy: Render Dashboard → New → Blueprint → point at this repo.
# The frontend deploys separately on Vercel (see the deploy guide).

databases:
  - name: wapike-db
    plan: free
    databaseName: wapike
    user: wapike

services:
  # --- API (FastAPI) ------------------------------------------------------
  - type: web
    name: wapike-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: wapike-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      # Set these in the dashboard (Environment tab):
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false          # e.g. https://your-app.vercel.app,http://localhost:3000
      - key: CORS_ORIGIN_REGEX
        sync: false          # optional, e.g. https://.*\.vercel\.app

  # --- Daily events ingestion + lifecycle (cron) --------------------------
  - type: cron
    name: wapike-events
    runtime: python
    rootDir: backend
    plan: free
    schedule: "0 3 * * *"     # 03:00 UTC daily
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m event_ingestion.scheduler"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: wapike-db
          property: connectionString
